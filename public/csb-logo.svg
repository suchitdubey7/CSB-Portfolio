<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Clip children inside the white circle -->
    <clipPath id="circleClip">
      <circle cx="100" cy="100" r="59"/>
    </clipPath>
  </defs>

  <!-- Outer petal ring 1 -->
  <g transform="translate(100,100)">
    <ellipse rx="11" ry="36" fill="#F0A500" transform="rotate(0) translate(0,-60)"/>
    <ellipse rx="11" ry="36" fill="#F0A500" transform="rotate(22.5) translate(0,-60)"/>
    <ellipse rx="11" ry="36" fill="#F0A500" transform="rotate(45) translate(0,-60)"/>
    <ellipse rx="11" ry="36" fill="#F0A500" transform="rotate(67.5) translate(0,-60)"/>
    <ellipse rx="11" ry="36" fill="#F0A500" transform="rotate(90) translate(0,-60)"/>
    <ellipse rx="11" ry="36" fill="#F0A500" transform="rotate(112.5) translate(0,-60)"/>
    <ellipse rx="11" ry="36" fill="#F0A500" transform="rotate(135) translate(0,-60)"/>
    <ellipse rx="11" ry="36" fill="#F0A500" transform="rotate(157.5) translate(0,-60)"/>
    <ellipse rx="11" ry="36" fill="#F0A500" transform="rotate(180) translate(0,-60)"/>
    <ellipse rx="11" ry="36" fill="#F0A500" transform="rotate(202.5) translate(0,-60)"/>
    <ellipse rx="11" ry="36" fill="#F0A500" transform="rotate(225) translate(0,-60)"/>
    <ellipse rx="11" ry="36" fill="#F0A500" transform="rotate(247.5) translate(0,-60)"/>
    <ellipse rx="11" ry="36" fill="#F0A500" transform="rotate(270) translate(0,-60)"/>
    <ellipse rx="11" ry="36" fill="#F0A500" transform="rotate(292.5) translate(0,-60)"/>
    <ellipse rx="11" ry="36" fill="#F0A500" transform="rotate(315) translate(0,-60)"/>
    <ellipse rx="11" ry="36" fill="#F0A500" transform="rotate(337.5) translate(0,-60)"/>
  </g>
  <!-- Inner petal ring (offset, darker) -->
  <g transform="translate(100,100)">
    <ellipse rx="8" ry="28" fill="#C97A05" opacity="0.65" transform="rotate(11.25) translate(0,-54)"/>
    <ellipse rx="8" ry="28" fill="#C97A05" opacity="0.65" transform="rotate(33.75) translate(0,-54)"/>
    <ellipse rx="8" ry="28" fill="#C97A05" opacity="0.65" transform="rotate(56.25) translate(0,-54)"/>
    <ellipse rx="8" ry="28" fill="#C97A05" opacity="0.65" transform="rotate(78.75) translate(0,-54)"/>
    <ellipse rx="8" ry="28" fill="#C97A05" opacity="0.65" transform="rotate(101.25) translate(0,-54)"/>
    <ellipse rx="8" ry="28" fill="#C97A05" opacity="0.65" transform="rotate(123.75) translate(0,-54)"/>
    <ellipse rx="8" ry="28" fill="#C97A05" opacity="0.65" transform="rotate(146.25) translate(0,-54)"/>
    <ellipse rx="8" ry="28" fill="#C97A05" opacity="0.65" transform="rotate(168.75) translate(0,-54)"/>
    <ellipse rx="8" ry="28" fill="#C97A05" opacity="0.65" transform="rotate(191.25) translate(0,-54)"/>
    <ellipse rx="8" ry="28" fill="#C97A05" opacity="0.65" transform="rotate(213.75) translate(0,-54)"/>
    <ellipse rx="8" ry="28" fill="#C97A05" opacity="0.65" transform="rotate(236.25) translate(0,-54)"/>
    <ellipse rx="8" ry="28" fill="#C97A05" opacity="0.65" transform="rotate(258.75) translate(0,-54)"/>
    <ellipse rx="8" ry="28" fill="#C97A05" opacity="0.65" transform="rotate(281.25) translate(0,-54)"/>
    <ellipse rx="8" ry="28" fill="#C97A05" opacity="0.65" transform="rotate(303.75) translate(0,-54)"/>
    <ellipse rx="8" ry="28" fill="#C97A05" opacity="0.65" transform="rotate(326.25) translate(0,-54)"/>
    <ellipse rx="8" ry="28" fill="#C97A05" opacity="0.65" transform="rotate(348.75) translate(0,-54)"/>
  </g>

  <!-- White circle -->
  <circle cx="100" cy="100" r="60" fill="white"/>
  <!-- Gold border -->
  <circle cx="100" cy="100" r="60" fill="none" stroke="#E8940A" stroke-width="2.5"/>

  <!-- Curved "CHINMAYA SMILES" text -->
  <defs>
    <path id="topArc" d="M 47,100 A 53,53 0 1,1 153,100"/>
  </defs>
  <text font-family="'Arial Black', 'Arial Bold', Arial, sans-serif" font-weight="900" font-size="11" fill="#1A1A2E" letter-spacing="2.0">
    <textPath href="#topArc" startOffset="5%">CHINMAYA SMILES</textPath>
  </text>

  <!-- Microphone (clipped inside circle) -->
  <g clip-path="url(#circleClip)">
    <g transform="translate(100,84)">
      <!-- Mic body -->
      <rect x="-7" y="-22" width="14" height="22" rx="7" fill="#2C3E6B"/>
      <!-- Mic grille lines -->
      <line x1="-5.5" y1="-14" x2="5.5" y2="-14" stroke="white" stroke-width="1.4" opacity="0.55"/>
      <line x1="-6.5" y1="-9" x2="6.5" y2="-9" stroke="white" stroke-width="1.4" opacity="0.55"/>
      <line x1="-6.5" y1="-4" x2="6.5" y2="-4" stroke="white" stroke-width="1.4" opacity="0.55"/>
      <!-- Mic arm arc -->
      <path d="M-11,-3 Q-11,12 0,12 Q11,12 11,-3" fill="none" stroke="#2C3E6B" stroke-width="2.5" stroke-linecap="round"/>
      <!-- Mic stand -->
      <line x1="0" y1="12" x2="0" y2="20" stroke="#2C3E6B" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="-7" y1="20" x2="7" y2="20" stroke="#2C3E6B" stroke-width="2.5" stroke-linecap="round"/>
    </g>

    <!-- 5 children silhouettes, all clipped inside circle -->
    <g fill="#2C3E6B">
      <!-- Far left -->
      <circle cx="54" cy="132" r="4"/>
      <path d="M50,136 Q52,148 54,152 Q56,148 58,136 Z"/>
      <line x1="50" y1="139" x2="44" y2="130" stroke="#2C3E6B" stroke-width="2" stroke-linecap="round"/>
      <line x1="58" y1="139" x2="63" y2="131" stroke="#2C3E6B" stroke-width="2" stroke-linecap="round"/>

      <!-- Left -->
      <circle cx="71" cy="128" r="4.5"/>
      <path d="M67,132 Q69,145 71,149 Q73,145 75,132 Z"/>
      <line x1="67" y1="135" x2="60" y2="125" stroke="#2C3E6B" stroke-width="2.3" stroke-linecap="round"/>
      <line x1="75" y1="135" x2="81" y2="126" stroke="#2C3E6B" stroke-width="2.3" stroke-linecap="round"/>

      <!-- Center (tallest) -->
      <circle cx="100" cy="123" r="5.5"/>
      <path d="M95,129 Q97.5,143 100,148 Q102.5,143 105,129 Z"/>
      <line x1="95" y1="132" x2="85" y2="120" stroke="#2C3E6B" stroke-width="2.8" stroke-linecap="round"/>
      <line x1="105" y1="132" x2="115" y2="120" stroke="#2C3E6B" stroke-width="2.8" stroke-linecap="round"/>

      <!-- Right -->
      <circle cx="129" cy="128" r="4.5"/>
      <path d="M125,132 Q127,145 129,149 Q131,145 133,132 Z"/>
      <line x1="125" y1="135" x2="119" y2="126" stroke="#2C3E6B" stroke-width="2.3" stroke-linecap="round"/>
      <line x1="133" y1="135" x2="140" y2="125" stroke="#2C3E6B" stroke-width="2.3" stroke-linecap="round"/>

      <!-- Far right -->
      <circle cx="146" cy="132" r="4"/>
      <path d="M142,136 Q144,148 146,152 Q148,148 150,136 Z"/>
      <line x1="142" y1="139" x2="137" y2="131" stroke="#2C3E6B" stroke-width="2" stroke-linecap="round"/>
      <line x1="150" y1="139" x2="156" y2="130" stroke="#2C3E6B" stroke-width="2" stroke-linecap="round"/>
    </g>
  </g>
</svg>
